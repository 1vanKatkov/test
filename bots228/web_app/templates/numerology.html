<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Нумерология</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #2c003e; color: white; text-align: center; padding: 20px; }
        .form-container { background-color: #4b0082; padding: 30px; border-radius: 15px; display: inline-block; width: 80%; max-width: 500px; }
        input { width: 90%; margin-bottom: 20px; border-radius: 8px; border: none; padding: 12px; font-size: 16px; }
        button { background-color: #ffd700; color: #2c003e; border: none; padding: 15px 30px; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #ffea00; }
        .back-link { margin-top: 20px; display: block; color: #ccc; }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>🔢 Нумерологический отчет</h1>
        <form action="/numerology/report" method="post">
            <input type="text" name="name" placeholder="Ваше имя (на кириллице)" required>
            <br>
            <label for="birthdate">Дата рождения:</label><br>
            <input type="date" name="birthdate" id="birthdate" required>
            <br>
            <button type="submit">Сгенерировать PDF</button>
        </form>
        <a href="/" class="back-link">На главную</a>
    </div>
</body>
</html>
