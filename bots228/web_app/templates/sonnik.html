<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Сонник</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #2c003e; color: white; text-align: center; padding: 20px; }
        .form-container { background-color: #4b0082; padding: 30px; border-radius: 15px; display: inline-block; width: 80%; max-width: 600px; }
        textarea { width: 100%; height: 150px; margin-bottom: 20px; border-radius: 8px; border: none; padding: 10px; font-size: 16px; }
        button { background-color: #ffd700; color: #2c003e; border: none; padding: 15px 30px; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #ffea00; }
        .back-link { margin-top: 20px; display: block; color: #ccc; }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>🌙 Расшифровка сна</h1>
        <p>Опишите ваш сон как можно подробнее:</p>
        <form action="/sonnik/interpret" method="post">
            <textarea name="dream_text" placeholder="Мне снилось, что я..." required></textarea>
            <br>
            <button type="submit">Получить толкование</button>
        </form>
        <a href="/" class="back-link">На главную</a>
    </div>
</body>
</html>
