<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2D1B4E">
    <title>Нумерология</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <a href="/" class="back-button">← Назад</a>
            <h1>🔮 Нумерология</h1>
            <div class="balance" id="balance">
                <span class="spark-icon">💎</span>
                <span id="balanceValue">—</span>
            </div>
        </header>

        <main class="main-content">
            <div class="form-section">
                <p class="description">
                    Получите персональный нумерологический отчет на основе вашего имени и даты рождения.
                </p>

                <form id="numerologyForm" class="form">
                    <div class="form-group">
                        <label for="fullName">Ваше имя (кириллица)</label>
                        <input 
                            type="text" 
                            id="fullName" 
                            name="fullName" 
                            placeholder="Например: Иван"
                            required
                            pattern="[А-Яа-яЁё\s]+"
                        >
                    </div>

                    <div class="form-group">
                        <label for="birthDate">Дата рождения</label>
                        <input 
                            type="text" 
                            id="birthDate" 
                            name="birthDate" 
                            placeholder="ДД.ММ.ГГГГ"
                            required
                            pattern="\d{2}\.\d{2}\.\d{4}"
                        >
                        <small>Формат: ДД.ММ.ГГГГ (например: 28.01.1991)</small>
                    </div>

                    <button type="submit" class="submit-button" id="submitBtn">
                        <span class="button-text">Получить отчет</span>
                        <span class="button-cost">5 искр</span>
                    </button>
                </form>

                <div id="result" class="result-section" style="display: none;">
                    <div class="success-message">
                        <div class="success-icon">✅</div>
                        <p>Отчет готов!</p>
                        <a id="downloadLink" href="#" class="download-button" download>
                            📥 Скачать PDF
                        </a>
                    </div>
                </div>

                <div id="error" class="error-message" style="display: none;"></div>
            </div>
        </main>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const initData = tg.initDataUnsafe;
        const userId = initData?.user?.id;

        async function loadBalance() {
            if (!userId) return;
            try {
                const formData = new FormData();
                formData.append('telegram_id', userId);
                const response = await fetch('/api/balance', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                document.getElementById('balanceValue').textContent = data.balance || 0;
            } catch (error) {
                console.error('Error loading balance:', error);
            }
        }

        document.getElementById('numerologyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!userId) {
                showError('Не удалось определить пользователя');
                return;
            }

            const formData = new FormData(e.target);
            formData.append('telegram_id', userId);

            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.querySelector('.button-text').textContent;
            submitBtn.disabled = true;
            submitBtn.querySelector('.button-text').textContent = 'Генерирую...';

            document.getElementById('error').style.display = 'none';
            document.getElementById('result').style.display = 'none';

            try {
                const response = await fetch('/api/numerology/generate', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.error) {
                    showError(data.error);
                    submitBtn.disabled = false;
                    submitBtn.querySelector('.button-text').textContent = originalText;
                    return;
                }

                if (data.success) {
                    document.getElementById('downloadLink').href = data.pdf_url;
                    document.getElementById('result').style.display = 'block';
                    document.getElementById('balanceValue').textContent = data.balance;
                    tg.HapticFeedback.notificationOccurred('success');
                }
            } catch (error) {
                showError('Ошибка при генерации отчета');
                console.error('Error:', error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.querySelector('.button-text').textContent = originalText;
            }
        });

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            tg.HapticFeedback.notificationOccurred('error');
        }

        if (userId) {
            loadBalance();
        }
    </script>
</body>
</html>
