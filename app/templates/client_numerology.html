<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ brand_name }} - {{ t.numerology }}</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script defer src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body
  class="app-shell mobile-client-shell"
  data-dev-auth-bypass="{{ 'true' if dev_auth_bypass else 'false' }}"
  data-dev-auth-mock-username="{{ dev_auth_mock_username }}"
  data-lang="{{ lang }}"
>
  <header class="app-topbar client-topbar">
    <div class="topbar-inner">
      <a class="brand" href="/client?lang={{ lang }}">{{ brand_name }}</a>
      <div class="user-chip">
        <a class="auth-username-link" href="/client/profile?lang={{ lang }}"><span id="auth-username">{{ initial_auth_username }}</span></a>
        <span class="spark-pill"><span id="header-sparks">-</span> {{ t.sparks }}</span>
      </div>
    </div>
  </header>

  <main class="mobile-client">
    <section class="card compact-card">
      <h2>{{ t.numerology }}</h2>
      <div class="muted"><span id="auth-provider">{{ initial_auth_provider }}</span></div>
    </section>

    <section class="card">
      <form id="numerology-form" class="form-grid">
        <label>{{ t.full_name }} <input id="full-name" required /></label>
        <label>{{ t.birth_date }} <input id="birth-date" placeholder="15.04.1985" required /></label>
        <button type="submit" class="primary-btn">{{ t.generate_report }}</button>
      </form>
      <div id="numerology-result" class="result"></div>
    </section>

    <section class="card" id="email-auth-entry">
      <h2>{{ t.email_auth }}</h2>
      <button id="open-email-auth-modal" class="primary-btn" type="button">{{ t.login }}</button>
    </section>
  </main>

  <div id="email-auth-modal" class="modal-overlay">
    <section class="modal-card">
      <div class="payment-row-top">
        <h3>{{ t.email_auth }}</h3>
        <button id="close-email-auth-modal" class="ghost-btn" type="button">×</button>
      </div>
      <form id="email-register-form" class="form-grid">
        <label>{{ t.email }} <input id="register-email" type="email" required /></label>
        <label>{{ t.password }} <input id="register-password" type="password" required /></label>
        <label>{{ t.username }} <input id="register-username" /></label>
        <button type="submit" class="primary-btn">{{ t.register }}</button>
      </form>
      <form id="email-login-form" class="form-grid">
        <label>{{ t.email }} <input id="login-email" type="email" required /></label>
        <label>{{ t.password }} <input id="login-password" type="password" required /></label>
        <button type="submit" class="secondary-btn">{{ t.login }}</button>
      </form>
      <pre id="auth-result" class="result"></pre>
    </section>
  </div>

  <script defer src="/static/app.js"></script>
</body>
</html>
