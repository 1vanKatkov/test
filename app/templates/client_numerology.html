<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ brand_name }} - Нумерология</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script defer src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body
  class="app-shell mobile-client-shell"
  data-dev-auth-bypass="{{ 'true' if dev_auth_bypass else 'false' }}"
  data-dev-auth-mock-username="{{ dev_auth_mock_username }}"
>
  <header class="app-topbar client-topbar">
    <div class="topbar-inner">
      <a class="brand" href="/client">{{ brand_name }}</a>
      <a class="ghost-btn" href="/client">На главную</a>
    </div>
  </header>

  <main class="mobile-client">
    <section class="card compact-card">
      <div class="row">
        <h2>Нумерология</h2>
        <button id="refresh-balance" type="button" class="primary-btn">Обновить</button>
      </div>
      <div class="muted">Режим: <span id="auth-provider">Гость</span></div>
      <div id="balance-view" class="balance">-</div>
    </section>

    <section class="card">
      <form id="numerology-form" class="form-grid">
        <label>Полное имя <input id="full-name" required /></label>
        <label>Дата рождения (ДД.ММ.ГГГГ) <input id="birth-date" placeholder="15.04.1985" required /></label>
        <button type="submit" class="primary-btn">Сгенерировать PDF</button>
      </form>
      <div id="numerology-result" class="result"></div>
    </section>
  </main>

  <script defer src="/static/app.js"></script>
</body>
</html>
