<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ brand_name }} - {{ t.topup }}</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script defer src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body
  class="app-shell mobile-client-shell"
  data-dev-auth-bypass="{{ 'true' if dev_auth_bypass else 'false' }}"
  data-dev-auth-mock-username="{{ dev_auth_mock_username }}"
  data-lang="{{ lang }}"
>
  <header class="app-topbar client-topbar">
    <div class="topbar-inner">
      <a class="brand" href="/client?lang={{ lang }}">{{ brand_name }}</a>
      <a class="ghost-btn" href="/client?lang={{ lang }}">{{ t.home }}</a>
    </div>
  </header>

  <main class="mobile-client">
    <section class="card compact-card">
      <div class="row">
        <h2>{{ t.topup }}</h2>
        <button id="refresh-balance" type="button" class="primary-btn">{{ t.refresh }}</button>
      </div>
      <div class="muted">{{ t.mode }}: <span id="auth-provider">{{ t.guest }}</span></div>
      <div id="balance-view" class="balance">-</div>
    </section>

    <section class="card">
      <h2>{{ t.yookassa_payment }}</h2>
      <form id="payment-create-form" class="form-grid">
        <label>{{ t.spark_package }}
          <select id="payment-package"></select>
        </label>
        <button type="submit" class="primary-btn">{{ t.create_payment }}</button>
      </form>
      <form id="payment-check-form" class="form-grid">
        <label>Payment ID <input id="payment-id" placeholder="2f8f6..." /></label>
        <button type="submit" class="primary-btn">{{ t.check_payment }}</button>
      </form>
      <pre id="payment-result" class="result"></pre>
    </section>
  </main>

  <script defer src="/static/app.js"></script>
</body>
</html>
