<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ brand_name }} - {{ t.sonnik }}</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script defer src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body
  class="app-shell mobile-client-shell"
  data-dev-auth-bypass="{{ 'true' if dev_auth_bypass else 'false' }}"
  data-dev-auth-mock-username="{{ dev_auth_mock_username }}"
  data-lang="{{ lang }}"
>
  <header class="app-topbar client-topbar">
    <div class="topbar-inner">
      <a class="brand" href="/client?lang={{ lang }}">{{ brand_name }}</a>
      <div class="user-chip">
        <span id="auth-username">{{ t.guest }}</span>
        <span class="spark-pill"><span id="header-sparks">-</span> {{ t.sparks }}</span>
      </div>
    </div>
  </header>

  <main class="mobile-client">
    <section class="card compact-card">
      <h2>{{ t.sonnik }}</h2>
      <div class="muted"><span id="auth-provider">{{ t.guest }}</span></div>
    </section>

    <section class="card">
      <form id="sonnik-form" class="form-grid">
        <label>{{ t.dream_description }}
          <textarea id="dream-text" rows="6" required></textarea>
        </label>
        <button type="submit" class="primary-btn">{{ t.get_interpretation }}</button>
      </form>
      <pre id="sonnik-result" class="result"></pre>
    </section>
  </main>

  <script defer src="/static/app.js"></script>
</body>
</html>
