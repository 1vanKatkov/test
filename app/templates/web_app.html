<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Панель сервисов</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="app-shell">
  <header class="app-topbar">
    <div class="topbar-inner">
      <a class="brand" href="/">{{ brand_name }}</a>
      <a class="ghost-btn" href="/">На главную</a>
    </div>
  </header>

  <main class="container app-container">
    <header class="section-head">
      <h1>Панель сервисов</h1>
      <p>Полный доступ к соннику, нумерологии и анализу совместимости без обязательной авторизации.</p>
    </header>

    <section class="card">
      <div class="row">
        <h2>Баланс</h2>
        <button id="refresh-balance" type="button" class="primary-btn">Обновить</button>
      </div>
      <div id="balance-view" class="balance">-</div>
    </section>

    <section class="card">
      <h2>Сонник</h2>
      <form id="sonnik-form" class="form-grid">
        <label>Описание сна
          <textarea id="dream-text" rows="5" required></textarea>
        </label>
        <button type="submit" class="primary-btn">Получить интерпретацию</button>
      </form>
      <pre id="sonnik-result" class="result"></pre>
    </section>

    <section class="card">
      <h2>Нумерология</h2>
      <form id="numerology-form" class="form-grid">
        <label>Полное имя <input id="full-name" required /></label>
        <label>Дата рождения (ДД.ММ.ГГГГ) <input id="birth-date" placeholder="15.04.1985" required /></label>
        <button type="submit" class="primary-btn">Сгенерировать PDF</button>
      </form>
      <div id="numerology-result" class="result"></div>
    </section>

    <section class="card">
      <h2>Совместимость</h2>
      <div class="tabs">
        <button class="tab-btn active" data-tab="names-only" type="button">По именам</button>
        <button class="tab-btn" data-tab="names-dates" type="button">По именам и датам</button>
      </div>

      <form id="compat-names-form" class="form-grid tab-content active">
        <label>Имя 1 <input id="compat-name1" required /></label>
        <label>Имя 2 <input id="compat-name2" required /></label>
        <button type="submit" class="primary-btn">Рассчитать совместимость</button>
      </form>

      <form id="compat-names-dates-form" class="form-grid tab-content">
        <label>Имя 1 <input id="compat-nd-name1" required /></label>
        <label>Дата 1 (ДД.ММ.ГГГГ) <input id="compat-date1" required /></label>
        <label>Имя 2 <input id="compat-nd-name2" required /></label>
        <label>Дата 2 (ДД.ММ.ГГГГ) <input id="compat-date2" required /></label>
        <button type="submit" class="primary-btn">Рассчитать совместимость</button>
      </form>
      <pre id="compat-result" class="result"></pre>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
